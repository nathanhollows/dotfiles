# Colour support
set-option -sa terminal-overrides ',xterm*:Tc'

# Mouse support
set -g mouse on

# Line at top
set-option -g status-position top

# Start windows at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set prefix: C-Space on crouton, C-b everywhere else
if-shell 'test "$(hostname)" = "crouton"' \
  "set -g prefix C-Space ; unbind C-b" \
  "set -g prefix C-b"
bind C-Space send-prefix

# Vim key bindings
set-window-option -g mode-keys vi

# Plugin manager path
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_window_status_style 'none'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# -- Status bar: catppuccin frappe, transparent bg, powerline glyphs --
set -g status-style 'bg=default'
set -g status-bg default
set -g window-status-separator ''

# Inactive window: number + name, muted, no caps
set -g window-status-format "#[fg=#737994,bg=default] #I #[fg=#a5adce,bg=default]#W "

# Active window: mauve pill with rounded caps
set -g window-status-current-format "#[fg=#ca9ee6,bg=default]#[fg=#232634,bg=#ca9ee6] #I #[fg=#232634,bg=#ca9ee6,bold]#W #[fg=#ca9ee6,bg=default]"

# status-left: session name in a mauve pill
set -g status-left-length 50
set -g status-left '#[fg=#ca9ee6,bg=default]#[fg=#232634,bg=#ca9ee6,bold] #S #[fg=#ca9ee6,bg=default] '

# status-right: RAM + hostname + clock (red 11pm-2am, yellow 10pm)
set -g status-right '#[fg=#a5adce,bg=default] #(free -h | awk "/^Mem:/ {print \$3}") #[fg=#babbf1,bg=default] #h #[fg=#{?#(test $(date +%H) -ge 23 -o $(date +%H) -le 2 && echo 1),#e78284,#{?#(test $(date +%H) -eq 22 && echo 1),#e5c890,#ca9ee6}},bg=default]#[fg=#232634,bg=#{?#(test $(date +%H) -ge 23 -o $(date +%H) -le 2 && echo 1),#e78284,#{?#(test $(date +%H) -eq 22 && echo 1),#e5c890,#ca9ee6}}] %I:%M %p #[fg=#{?#(test $(date +%H) -ge 23 -o $(date +%H) -le 2 && echo 1),#e78284,#{?#(test $(date +%H) -eq 22 && echo 1),#e5c890,#ca9ee6}},bg=default]'

# New session with name prompt
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Open panes in current directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
